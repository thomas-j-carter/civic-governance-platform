version: 1
last_updated: 2026-03-22

rules:
  canonical_status_values:
    - draft
    - review
    - canonical
    - superseded
    - archived
  visibility_values:
    - internal
    - public
    - ai-context
  public_promotion_requires:
    - owner_approval
    - public_safety_review
    - editorial_review
  generated_content_must_be_marked: true

